format = """\
$directory\
$git_branch\
$git_status\
$kubernetes\
$docker_context\
$python\
$golang\
$nodejs\
$terraform\
$nix_shell\
$cmd_duration\
$line_break\
$character"""

right_format = """\
$status\
[в—Ҹ](red)[в—Ҹ](yellow)[в—Ҹ](green)[в—Ҹ](blue) $username\
$hostname\
$time [в—Ҹ](blue)[в—Ҹ](green)[в—Ҹ](yellow)[в—Ҹ](red)"""

[character]
success_symbol = "[в—Ҹ](red)[в—Ҹ](yellow)[в—Ҹ](green)[в—Ҹ](blue) "
error_symbol = "[в—Ҹ](red)[в—Ҹ](red)[в—Ҹ](red)[в—Ҹ](red) "
vimcmd_symbol = "[в—Ҹ](blue)[в—Ҹ](blue)[в—Ҹ](blue)[в—Ҹ](blue) "

[status]
disabled = false
symbol = "пҒұ "
format = "[$symbol$status]($style) "
style = "bold red"

[username]
show_always = true
format = "[$user]($style)@"
style_user = "bold yellow"
style_root = "bold red"

[hostname]
ssh_only = false
format = "[$hostname]($style) "
style = "bold yellow"

[time]
disabled = false
format = "пҖ— $time"
time_format = "%H:%M"
style = "#606060"

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"
read_only = " пҖЈ"
home_symbol = "пҖ• ~"
format = "[пҒј $path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"Documents" = " Docs"
"Downloads" = " Down"
"Projects" = " Proj"

[git_branch]
symbol = "оӮ  "
format = "[оӮұ $symbol$branch(:$remote_branch)]($style) "
style = "bold purple"

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold red"
stashed = "пҖң "
ahead = "вҶ‘${count}"
behind = "вҶ“${count}"
diverged = "вҶ‘${ahead_count}вҶ“${behind_count}"
conflicted = "=${count}"
deleted = "вңҳ${count}"
renamed = "В»${count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"

[kubernetes]
disabled = false
symbol = "вҳё "
format = "[оӮұ $symbol$context(/$namespace)]($style) "
style = "bold blue"

[docker_context]
symbol = "пҢҲ "
format = "[оӮұ $symbol$context]($style) "
style = "blue"
only_with_files = true

[terraform]
symbol = "оҡҡ "
format = "[оӮұ $symbol$version]($style) "
style = "bold 105"

[python]
symbol = "оңј "
format = "[оӮұ $symbol$version($virtualenv)]($style) "
style = "bold yellow"

[golang]
symbol = "оҳ§ "
format = "[оӮұ $symbol$version]($style) "
style = "bold cyan"

[nodejs]
symbol = "оңҳ "
format = "[оӮұ $symbol$version]($style) "
style = "bold green"

[nix_shell]
symbol = "пҢ“ "
format = "[оӮұ $symbol$state]($style) "
style = "bold blue"

[cmd_duration]
min_time = 1_500
format = "[оӮұ took $duration]($style) "
style = "bold yellow"
